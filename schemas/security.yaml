openapi: 3.0.3
info:
  title: PullLog Security Schemes
  version: 1.0.0
paths: {}
components:
  securitySchemes:
    CsrfAuth:
      type: apiKey
      in: header
      name: x-csrf-token
      description: "CSRF対策用トークン。全ての認証済みAPIで必要"
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: "APIキー認証。x-api-key ヘッダーで送信する"
