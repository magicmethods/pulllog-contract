openapi: 3.0.3
info:
  title: PullLog API
  description: |
    ガチャ履歴管理アプリ「PullLog」バックエンドAPI仕様
  version: 1.0.0
servers:
  - url: https://api.pulllog.net/{basePath}
    description: Production v1
    variables:
      basePath:
        default: v1
        description: APIバージョン
  - url: http://localhost:3030/{basePath}
    description: Local development beta
    variables:
      basePath:
        default: beta
        description: APIバージョン

paths:
  /auth/login:
    $ref: './paths/auth.yaml#/~1auth~1login'
  /auth/logout:
    $ref: './paths/auth.yaml#/~1auth~1logout'
  /auth/register:
    $ref: './paths/auth.yaml#/~1auth~1register'
  /auth/password:
    $ref: './paths/auth.yaml#/~1auth~1password'
  /auth/verify:
    $ref: './paths/auth.yaml#/~1auth~1verify'
  /auth/autologin:
    $ref: './paths/auth.yaml#/~1auth~1autologin'
  /auth/csrf/refresh:
    $ref: './paths/auth.yaml#/~1auth~1csrf~1refresh'
  /auth/google/exchange:
    $ref: './paths/auth.yaml#/~1auth~1google~1exchange'
  /currencies:
    $ref: './paths/apps.yaml#/~1currencies'
  /apps:
    $ref: './paths/apps.yaml#/~1apps'
  /apps/{appId}:
    $ref: './paths/apps.yaml#/~1apps~1{appId}'
  /logs/{appId}:
    $ref: './paths/logs.yaml#/~1logs~1{appId}'
  /logs/daily/{appId}/{date}:
    $ref: './paths/logs.yaml#/~1logs~1daily~1{appId}~1{date}'
  /logs/import/{appId}:
    $ref: './paths/logs.yaml#/~1logs~1import~1{appId}'
  /stats/{appId}:
    $ref: './paths/logs.yaml#/~1stats~1{appId}'
  /user:
    $ref: './paths/user.yaml#/~1user'
  /user/update:
    $ref: './paths/user.yaml#/~1user~1update'
  /user/avatar:
    $ref: './paths/user.yaml#/~1user~1avatar'
  /user-filters/{context}:
    $ref: './paths/user.yaml#/~1user-filters~1{context}'
  /gallery/assets/upload-ticket:
    $ref: './paths/gallery.yaml#/~1gallery~1assets~1upload-ticket'
  /gallery/assets:
    $ref: './paths/gallery.yaml#/~1gallery~1assets'
  /gallery/assets/{assetId}:
    $ref: './paths/gallery.yaml#/~1gallery~1assets~1{assetId}'
  /gallery/assets/{assetId}/content:
    $ref: './paths/gallery.yaml#/~1gallery~1assets~1{assetId}~1content'
  /gallery/usage:
    $ref: './paths/gallery.yaml#/~1gallery~1usage'

components:
  schemas:
    # 認証・ユーザー関連
    LoginRequest:
      $ref: './schemas/auth.yaml#/components/schemas/LoginRequest'
    LoginResponse:
      $ref: './schemas/auth.yaml#/components/schemas/LoginResponse'
    CsrfRefreshRequest:
      $ref: './schemas/auth.yaml#/components/schemas/CsrfRefreshRequest'
    CsrfRefreshResponse:
      $ref: './schemas/auth.yaml#/components/schemas/CsrfRefreshResponse'
    GoogleExchangeRequest:
      $ref: './schemas/auth.yaml#/components/schemas/GoogleExchangeRequest'
    RegisterRequest:
      $ref: './schemas/auth.yaml#/components/schemas/RegisterRequest'
    RegisterResponse:
      $ref: './schemas/auth.yaml#/components/schemas/RegisterResponse'
    UserResponse:
      $ref: './schemas/auth.yaml#/components/schemas/UserResponse'
    UserPlanLimits:
      $ref: './schemas/auth.yaml#/components/schemas/UserPlanLimits'
    PasswordResetRequest:
      $ref: './schemas/auth.yaml#/components/schemas/PasswordResetRequest'
    PasswordResetResponse:
      $ref: './schemas/auth.yaml#/components/schemas/PasswordResetResponse'
    PasswordUpdateRequest:
      $ref: './schemas/auth.yaml#/components/schemas/PasswordUpdateRequest'
    VerifyTokenRequest:
      $ref: './schemas/auth.yaml#/components/schemas/VerifyTokenRequest'
    VerifyResponse:
      $ref: './schemas/auth.yaml#/components/schemas/VerifyResponse'
    UserUpdateRequest:
      $ref: './schemas/auth.yaml#/components/schemas/UserUpdateRequest'
    UserUpdateRequestFormData:
      $ref: './schemas/auth.yaml#/components/schemas/UserUpdateRequestFormData'
    UserUpdateResponse:
      $ref: './schemas/auth.yaml#/components/schemas/UserUpdateResponse'
    AvatarUploadRequest:
      $ref: './schemas/auth.yaml#/components/schemas/AvatarUploadRequest'
    AvatarUploadResponse:
      $ref: './schemas/auth.yaml#/components/schemas/AvatarUploadResponse'

    # アプリ
    AppData:
      $ref: './schemas/app.yaml#/components/schemas/AppData'
    SymbolOption:
      $ref: './schemas/app.yaml#/components/schemas/SymbolOption'

    # ログ
    DateLog:
      $ref: './schemas/log.yaml#/components/schemas/DateLog'
    DropDetail:
      $ref: './schemas/log.yaml#/components/schemas/DropDetail'
    ImportLogsResponse:
      $ref: './schemas/log.yaml#/components/schemas/ImportLogsResponse'

    # ギャラリー
    GalleryAsset:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryAsset'
    GalleryAssetResponse:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryAssetResponse'
    GalleryAssetUploadRequest:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryAssetUploadRequest'
    GalleryUploadTicketRequest:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryUploadTicketRequest'
    GalleryUploadTicketHeaders:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryUploadTicketHeaders'
    GalleryUploadTicketResponse:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryUploadTicketResponse'
    GalleryAssetUpdateRequest:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryAssetUpdateRequest'
    GalleryAssetListResponse:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryAssetListResponse'
    GalleryUsageResponse:
      $ref: './schemas/gallery.yaml#/components/schemas/GalleryUsageResponse'
    PaginationLinks:
      $ref: './schemas/gallery.yaml#/components/schemas/PaginationLinks'
    PaginationMeta:
      $ref: './schemas/gallery.yaml#/components/schemas/PaginationMeta'

    # 共通
    DeleteResponse:
      $ref: './schemas/common.yaml#/components/schemas/DeleteResponse'
    Currency:
      $ref: './schemas/common.yaml#/components/schemas/Currency'
    CurrencyListResponse:
      $ref: './schemas/common.yaml#/components/schemas/CurrencyListResponse'
    UserFilterLayoutItem:
      $ref: './schemas/common.yaml#/components/schemas/UserFilterLayoutItem'
    UserFilterUpdateRequest:
      $ref: './schemas/common.yaml#/components/schemas/UserFilterUpdateRequest'
    UserFilterResponse:
      $ref: './schemas/common.yaml#/components/schemas/UserFilterResponse'
    UserFilterConflictResponse:
      $ref: './schemas/common.yaml#/components/schemas/UserFilterConflictResponse'
    StatsData:
      $ref: './schemas/common.yaml#/components/schemas/StatsData'

  securitySchemes:
    CsrfAuth:
      $ref: './schemas/security.yaml#/components/securitySchemes/CsrfAuth'
